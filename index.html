<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KENZ STORE | QRIS LANGSUNG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: white;
      position: relative;
      overflow-x: hidden;
    }

    /* 🖼️ BACKGROUND DARI FILE bg.png */
    .custom-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: url('bg.png') center/cover no-repeat;
      filter: brightness(0.7); /* biar teks tetap kebaca */
    }

    /* overlay gelap biar kontras */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 20;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 15px 30px;
    }

    .glass {
      background: rgba(10, 15, 30, 0.28);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(120, 160, 255, 0.2);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(210, 230, 255, 0.1) inset, 0 0 30px rgba(70, 130, 255, 0.25);
    }

    .hero {
      text-align: center;
      padding: 30px 20px 25px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(145deg, #b3d9ff, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #3b82f6;
      letter-spacing: 1px;
    }

    .hero p {
      color: rgba(220, 240, 255, 0.9);
      font-size: 1.2rem;
      font-weight: 300;
      text-shadow: 0 2px 5px #0a0c1a;
    }

    .tabs {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 12px 10px;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: #3b82f6 rgba(20, 30, 55, 0.5);
    }

    .tabs button {
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      background: rgba(20, 30, 55, 0.5);
      backdrop-filter: blur(12px);
      color: #f0f5ff;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 10, 30, 0.6), 0 0 0 1px rgba(90, 170, 255, 0.3) inset;
      transition: 0.2s;
      white-space: nowrap;
    }

    .tabs button.active {
      background: rgba(59, 130, 246, 0.65);
      box-shadow: 0 0 20px #3b82f6, 0 0 0 1px #a0c8ff inset;
      color: white;
    }

    .grid {
      padding: 10px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(12, 18, 38, 0.35);
      backdrop-filter: blur(16px) saturate(200%);
      border: 1px solid rgba(100, 160, 250, 0.25);
      border-radius: 28px;
      padding: 20px 16px;
      box-shadow: 0 15px 30px -10px black, 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      border-color: rgba(80, 160, 255, 0.7);
      transform: translateY(-5px);
      box-shadow: 0 20px 35px -8px #1e3a8a;
    }

    .card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.95);
    }

    .price {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(145deg, #b0d6ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 15px;
      text-shadow: 0 0 20px #2563eb;
    }

    .add {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 40px;
      background: rgba(59, 130, 246, 0.5);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px #3b82f6;
      transition: 0.2s;
    }

    .add:hover {
      background: #3b82f6;
      box-shadow: 0 0 30px #3b82f6;
    }

    .cart {
      margin: 30px 0 15px;
      padding: 22px 20px;
      background: rgba(8, 15, 30, 0.45);
      backdrop-filter: blur(18px) saturate(200%);
      border-radius: 40px;
      border: 1px solid rgba(90, 170, 250, 0.25);
    }

    .cart h2 {
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #e0f0ff;
      margin-bottom: 12px;
    }

    #cartList div {
      padding: 6px 0;
      border-bottom: 1px dashed rgba(200, 220, 255, 0.2);
      font-size: 1.05rem;
    }

    .total {
      margin: 18px 0 12px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #bbdaff;
    }

    .payment-area {
      margin: 10px 0 20px;
    }

    .payment-option {
      display: inline-block;
      margin-right: 24px;
      margin-bottom: 12px;
      background: rgba(30, 40, 70, 0.35);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid rgba(150, 200, 255, 0.2);
      cursor: pointer;
      transition: 0.2s;
    }

    .payment-option.selected {
      background: rgba(59, 130, 246, 0.5);
      border-color: #3b82f6;
      box-shadow: 0 0 15px #3b82f6;
    }

    .payment-option input {
      margin-right: 6px;
      accent-color: #3b82f6;
      transform: scale(1.1);
      pointer-events: none;
    }

    .payment-hint {
      background: rgba(0, 10, 25, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px 22px;
      margin: 5px 0 15px;
      border: 1px solid #3b82f6;
      color: #aac8ff;
      font-size: 1.1rem;
    }

    .wallet-info {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .wallet-info span {
      color: white;
      font-weight: 600;
      background: #1e3a8a;
      padding: 5px 18px;
      border-radius: 40px;
    }

    .qris-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
    }

    .qris-image {
      max-width: 250px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s;
    }

    .qris-image:hover {
      transform: scale(1.02);
    }

    .qris-caption {
      color: #ffd966;
      font-size: 0.95rem;
      text-align: center;
    }

    .checkout-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .checkout-btn {
      flex: 1 1 auto;
      padding: 16px 20px;
      border: none;
      border-radius: 60px;
      background: rgba(59, 130, 246, 0.6);
      backdrop-filter: blur(14px);
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 30px #1e3a8a;
      transition: 0.2s;
      min-width: 180px;
    }

    .checkout-btn.qris-download {
      background: rgba(147, 51, 234, 0.5);
      border-color: #a78bfa;
    }

    .checkout-btn:hover {
      background: #2563eb;
      box-shadow: 0 0 40px #3b82f6;
      border-color: white;
    }

    .checkout-btn.qris-download:hover {
      background: #9333ea;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(10, 20, 40, 0.4);
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 20px;
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 32px; }
      .qris-image { max-width: 200px; }
    }
  </style>
</head>
<body>
  <!-- 🖼️ BG.PNG DI SINI + OVERLAY GELAP -->
  <div class="custom-bg"></div>
  <div class="overlay"></div>

  <div class="content">
    <div class="hero glass">
      <h1>🌀 KENZ STORE VIP</h1>
      <p>liquid galaxy • pilih lalu checkout via WA</p>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>

    <!-- CART DENGAN QRIS LANGSUNG -->
    <div class="cart">
      <h2>🛒 Keranjang</h2>
      <div id="cartList"></div>
      <div class="total" id="total">Total: Rp 0</div>
      
      <!-- AREA PEMBAYARAN -->
      <div class="payment-area" id="paymentArea"></div>

      <!-- TEMPAT UNTUK MENAMPILKAN INFO NOMOR / QRIS LANGSUNG -->
      <div id="paymentHint" class="payment-hint"></div>

      <!-- KONTAINER TOMBOL CHECKOUT -->
      <div id="dynamicCheckout" class="checkout-container"></div>
    </div>
  </div>

  <script>
    const phone = "6288268364289";
    
    const paymentMethods = [
      { id: 'dana', label: 'DANA', number: '081224313572', type: 'wallet' },
      { id: 'gopay', label: 'GOPAY', number: '081224313572', type: 'wallet' },
      { id: 'qris', label: 'QRIS', type: 'qris', imageUrl: 'https://a.top4top.io/p_3717k180h0.jpg', number: '-' }
    ];

    let selectedPayment = null;

    const data = {
      "BEST SELLER": [
        { name: "AIM LOCK BEST SELLER", price: 20000 },
        { name: "AIMBOT SUPER V1", price: 25000 },
        { name: "AIMBOT SUPER V2", price: 30000 }
      ],
      "HEADLOCK": [
        { name: "HEADLOCK 65%", price: 30000 },
        { name: "HEADLOCK 85%", price: 35000 },
        { name: "HEADLOCK 90%", price: 40000 },
        { name: "HEADLOCK 65% + HOLO BLUE", price: 35000 },
        { name: "HEADLOCK 100% V1", price: 45000 },
        { name: "HEADLOCK 100% V2", price: 50000 },
        { name: "HEADLOCK ANOMALI", price: 60000 }
      ],
      "EZDRAG": [
        { name: "EZ DRAG 2.0", price: 25000 },
        { name: "EZ DRAG 2.1", price: 30000 },
        { name: "EZ DRAG 2.3", price: 35000 },
        { name: "EZ DRAG 2.10", price: 60000 },
        { name: "EZ DRAG VIP", price: 35000 }
      ],
      "DRAGHS": [
        { name: "DRAG HS 40%", price: 25000 },
        { name: "DRAG HS 80%", price: 30000 },
        { name: "DRAG HS 100% V1", price: 50000 },
        { name: "DRAG HS 100% V2", price: 60000 }
      ],
      "AIMLOCK": [
        { name: "AIM LOCK 80%", price: 25000 },
        { name: "AIM LOCK 90%", price: 30000 },
        { name: "AIM LOCK 100% V1", price: 35000 },
        { name: "AIM LOCK 100% V2", price: 50000 },
        { name: "AIM LOCK 100% V3", price: 60000 }
      ],
      "HOLOGRAM": [
        { name: "HOLOGRAM 3D", price: 50000 },
        { name: "HOLO BLUE V2", price: 40000 },
        { name: "HOLO GREEN", price: 30000 },
        { name: "HOLO SABER", price: 40000 },
        { name: "HOLO PREMIUM", price: 50000 }
      ],
      "DLL": [
        { name: "FILE GS 90%", price: 40000 },
        { name: "FILE GS 100%", price: 45000 },
        { name: "FILE AIM LOCK X ANTI LAG", price: 40000 },
        { name: "MB 600%", price: 70000 },
        { name: "MB 300%", price: 40000 },
        { name: "GRAFIK MINICKRAFT ALL MAP", price: 40000 },
      ]
    };

    let active = Object.keys(data)[0];
    let cart = [];

    function rupiah(n) {
      return "Rp " + n.toLocaleString("id-ID");
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";
      Object.keys(data).forEach(cat => {
        let btn = document.createElement("button");
        btn.textContent = cat;
        btn.className = (cat === active ? "active" : "");
        btn.onclick = () => {
          active = cat;
          renderTabs();
          renderProducts();
        };
        tabs.appendChild(btn);
      });
    }

    function renderProducts() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      data[active].forEach((p, i) => {
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${p.name}</h3>
          <div class="price">${rupiah(p.price)}</div>
          <button class="add" onclick="add(${i})">Tambah ke keranjang</button>
        `;
        grid.appendChild(card);
      });
    }

    function add(i) {
      cart.push(data[active][i]);
      renderCart();
    }

    function renderCart() {
      let list = document.getElementById("cartList");
      list.innerHTML = "";
      cart.forEach(item => {
        let d = document.createElement("div");
        d.innerHTML = `${item.name} - ${rupiah(item.price)}`;
        list.appendChild(d);
      });
      let total = cart.reduce((a, b) => a + b.price, 0);
      document.getElementById("total").innerText = "Total: " + rupiah(total);
    }

    function renderPaymentOptions() {
      const area = document.getElementById("paymentArea");
      area.innerHTML = "";

      paymentMethods.forEach(m => {
        const label = document.createElement("label");
        label.className = `payment-option ${selectedPayment?.id === m.id ? 'selected' : ''}`;
        
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "paymentMethod";
        radio.value = m.id;
        radio.checked = (selectedPayment?.id === m.id);
        
        label.onclick = () => setSelectedPayment(m);
        
        label.appendChild(radio);
        label.appendChild(document.createTextNode(` ${m.label}`));
        area.appendChild(label);
      });
    }

    function setSelectedPayment(method) {
      selectedPayment = method;
      renderPaymentOptions();
      updateHintAndButtons();
    }

    function updateHintAndButtons() {
      const hintDiv = document.getElementById("paymentHint");
      const checkoutContainer = document.getElementById("dynamicCheckout");
      
      if (!selectedPayment) {
        hintDiv.innerHTML = `💡 Pilih metode pembayaran`;
        checkoutContainer.innerHTML = `<button class="checkout-btn" onclick="checkoutWithWA()">✨ Checkout WhatsApp</button>`;
        return;
      }

      // HINT dengan tampilan berbeda untuk wallet dan qris
      if (selectedPayment.type === 'wallet') {
        hintDiv.innerHTML = `
          <div class="wallet-info">
            <span>${selectedPayment.label}</span> 
            <span>Nomor tujuan: <strong>${selectedPayment.number}</strong></span>
          </div>
        `;
        
        checkoutContainer.innerHTML = `<button class="checkout-btn" onclick="checkoutWithWA('${selectedPayment.label}')">✨ Checkout via WA (${selectedPayment.label})</button>`;
      
      } else { // QRIS - tampilkan gambar langsung
        hintDiv.innerHTML = `
          <div class="qris-container">
            <img src="${selectedPayment.imageUrl}" alt="QRIS Pembayaran" class="qris-image" onclick="window.open('${selectedPayment.imageUrl}', '_blank')" style="cursor: pointer;">
            <div class="qris-caption">👆 Klik gambar untuk memperbesar | Scan QRIS di atas</div>
          </div>
        `;
        
        checkoutContainer.innerHTML = `
          <button class="checkout-btn qris-download" onclick="window.open('${selectedPayment.imageUrl}', '_blank')">🔍 Perbesar QRIS</button>
          <button class="checkout-btn" onclick="checkoutWithWA('QRIS')">📱 Lanjut ke WhatsApp</button>
        `;
      }
    }

    function checkoutWithWA(paymentLabel = null) {
      if (cart.length === 0) {
        alert("Keranjang kosong");
        return;
      }

      let payMethod = paymentLabel || (selectedPayment ? selectedPayment.label : null);
      if (!payMethod) {
        alert("Pilih pembayaran dulu");
        return;
      }

      let msg = "Halo bang saya mau order:%0A";
      cart.forEach((item, i) => {
        msg += `${i + 1}. ${item.name} - ${rupiah(item.price)}%0A`;
      });

      let total = cart.reduce((a, b) => a + b.price, 0);
      msg += `%0ATotal: ${rupiah(total)}%0A`;
      msg += `Pembayaran: ${payMethod}`;
      
      if (selectedPayment?.type === 'qris') {
        msg += ` (saya sudah scan QRIS)`;
      }

      window.open(`https://wa.me/${phone}?text=${msg}`);
    }

    function init() {
      renderTabs();
      renderProducts();
      renderPaymentOptions();
      updateHintAndButtons();
    }

    init();
  </script>
</body>
</html>
